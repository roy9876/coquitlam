<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-W5SKZJV43H"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
    
      gtag('config', 'G-W5SKZJV43H');
    </script>

    <title>Coquitlam's Top 25 Taxpayers</title>
    <!-- Include Apache ECharts Library via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #fcfcfc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        #header-nav {
            padding: 20px 30px 10px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #fcfcfc;
        }
        #nav-bar-top {
            width: 100%;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 5px;
        }
        .back-link {
            text-decoration: none;
            color: #444;
            font-weight: 500;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.15s;
        }
        .back-link:hover {
            color: #000;
        }
        #title-container {
            text-align: center;
            width: 100%;
        }
        h2 {
            margin: 0;
            color: #333;
            font-size: 22px;
        }
        p.subtitle {
            margin: 4px 0 0 0;
            color: #666;
            font-size: 13px;
        }
        #controls-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            padding: 10px 0 15px 0;
            background-color: #fcfcfc;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #444;
        }
        button {
            padding: 8px 24px;
            font-size: 14px;
            font-weight: bold;
            background-color: #5470c6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #405ca3;
        }
        input[type="range"] {
            cursor: pointer;
            width: 150px;
        }
        /* Expanded explicitly to a larger static height to house 25 crisp horizontal bars perfectly */
        #chart-container {
            width: 100%;
            height: 1100px; 
            margin-top: 10px;
        }
        #content-footer {
            padding: 20px 30px 50px 30px;
            text-align: center;
            background: #fcfcfc;
        }
        .source-note {
            font-size: 12px;
            color: #888;
            margin-bottom: 15px;
        }
        .info-link-block {
            font-size: 14px;
            color: #444;
            line-height: 1.5;
        }
        .info-link-block a {
            color: #5470c6;
            text-decoration: underline;
            font-weight: 500;
        }
        .info-link-block a:hover {
            color: #405ca3;
        }
    </style>
</head>
<body>

    <div id="header-nav">
        <div id="nav-bar-top">
            <a href="index.html" class="back-link">&#8592; Back to Home</a>
        </div>
        <div id="title-container">
            <h2>City of Coquitlam: Top 25 Taxpayers</h2>
            <p class="subtitle">Dynamic visualization tracking property levy amounts year-over-year</p>
        </div>
    </div>
        
    <div id="controls-wrapper">
        <div class="control-group">
            <button id="play-pause-btn">Pause</button>
        </div>
        <div class="control-group">
            <label for="speed-slider"><strong>Animation Speed:</strong></label>
            <input type="range" id="speed-slider" min="1000" max="6000" step="500" value="3500">
            <span id="speed-val">3.5s</span>
        </div>
    </div>

    <!-- Layout container where the expanded 25-row chart runs -->
    <div id="chart-container"></div>

    <div id="content-footer">
        <div class="source-note">Source: City of Coquitlam</div>
        <div class="info-link-block">
            For another chart on the top taxpayers contribution to city revenues see <a href="financial.html#chart5" target="_blank">here</a>.
        </div>
    </div>

    <script src="top25app.js"></script>
</body>
</html>
